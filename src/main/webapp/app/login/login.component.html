<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-card__head">
      <span class="eyebrow">Narayanganj Gold</span>
      <h1 class="auth-card__title" data-cy="loginTitle">Sign in</h1>
      <hr class="rule-gold rule-gold--center" />
    </div>

    @if (authenticationError()) {
      <div class="alert alert-danger" data-cy="loginError">
        <strong>Failed to sign in!</strong> Please check your credentials and try again.
      </div>
    }
    <form class="form" (ngSubmit)="login()" [formGroup]="loginForm">
      <div class="mb-3">
        <label class="username-label" for="username">Username</label>
        <input
          type="text"
          class="form-control"
          name="username"
          id="username"
          placeholder="Your username"
          formControlName="username"
          data-cy="username"
        />
      </div>

      <div class="mb-3">
        <label for="password">Password</label>
        <input
          type="password"
          class="form-control"
          name="password"
          id="password"
          placeholder="Your password"
          formControlName="password"
          data-cy="password"
        />
      </div>

      <div class="form-check">
        <label class="form-check-label" for="rememberMe">
          <input class="form-check-input" type="checkbox" name="rememberMe" id="rememberMe" formControlName="rememberMe" />
          <span>Remember me</span>
        </label>
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-3" data-cy="submit">Sign in</button>
    </form>

    <div class="auth-card__links">
      <a routerLink="/account/reset/request" data-cy="forgetYourPasswordSelector">Forgot your password?</a>
      <span class="auth-card__sep">·</span>
      <a routerLink="/account/register">Register a new account</a>
    </div>
  </div>
</div>
