<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-card__head">
      <span class="eyebrow">Narayanganj Gold</span>
      <h1 class="auth-card__title">Activation</h1>
      <hr class="rule-gold rule-gold--center" />
    </div>
    @if (success()) {
      <div class="alert alert-success">
        <span><strong>Your user account has been activated.</strong> Please </span>
        <a class="alert-link" routerLink="/login">sign in</a>.
      </div>
    }
    @if (error()) {
      <div class="alert alert-danger"><strong>Your user could not be activated.</strong> Please use the registration form to sign up.</div>
    }
  </div>
</div>
