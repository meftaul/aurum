<nav data-cy="navbar" class="navbar aurum-navbar">
  <div class="container-fluid">
    <a class="navbar-brand logo" routerLink="/">
      <span class="logo-img"></span>
      <span class="navbar-title">Aurum</span>
    </a>

    <div class="d-flex align-items-center gap-2 ms-auto">
      <button
        type="button"
        class="btn btn-link aurum-theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="theme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
        data-cy="themeToggle"
      >
        <fa-icon [icon]="theme() === 'dark' ? 'sun' : 'moon'"></fa-icon>
      </button>

      @if (account() === null) {
        <button type="button" class="btn btn-primary" (click)="login()" data-cy="login">Sign in</button>
      } @else {
        <a class="btn btn-primary" routerLink="/dashboard">Dashboard</a>
      }
    </div>
  </div>
</nav>
