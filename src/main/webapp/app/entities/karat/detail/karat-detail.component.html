<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (karat(); as karatRef) {
      <div>
        <h2 data-cy="karatDetailsHeading"><span>Karat</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span>ID</span></dt>
          <dd>
            <span>{{ karatRef.id }}</span>
          </dd>
          <dt><span>Karat Type</span></dt>
          <dd>
            <span>{{ karatRef.karatType }}</span>
          </dd>
          <dt><span>Purity Percent</span></dt>
          <dd>
            <span>{{ karatRef.purityPercent }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span>Back</span>
        </button>

        <button type="button" [routerLink]="['/karat', karatRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span>Edit</span>
        </button>
      </div>
    }
  </div>
</div>
