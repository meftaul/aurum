<div class="row justify-content-center">
    <div class="col-8">
        <div *ngIf="karat">
            <h2><span>Karat</span> {{ karat.id }}</h2>

            <hr>

            <jhi-alert-error></jhi-alert-error>

            <dl class="row-md jh-entity-details">
                <dt><span>Karat Type</span></dt>
                <dd>
                    <span>{{ karat.karatType }}</span>
                </dd>
                <dt><span>Purity Percent</span></dt>
                <dd>
                    <span>{{ karat.purityPercent }}</span>
                </dd>
            </dl>

            <button type="submit"
                    (click)="previousState()"
                    class="btn btn-info">
                <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span>Back</span>
            </button>

            <button type="button"
                    [routerLink]="['/karat', karat.id, 'edit']"
                    class="btn btn-primary">
                <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span>Edit</span>
            </button>
        </div>
    </div>
</div>
