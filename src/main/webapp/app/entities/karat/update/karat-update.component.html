<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2 id="jhi-karat-heading" data-cy="KaratCreateUpdateHeading">Create or edit a Karat</h2>

      <div>
        <jhi-alert-error></jhi-alert-error>

        <div class="row mb-3" *ngIf="editForm.controls.id.value !== null">
          <label class="form-label" for="field_id">ID</label>
          <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
        </div>

        <div class="row mb-3">
          <label class="form-label" for="field_karatType">Karat Type</label>
          <input type="text" class="form-control" name="karatType" id="field_karatType" data-cy="karatType" formControlName="karatType" />
        </div>

        <div class="row mb-3">
          <label class="form-label" for="field_purityPercent">Purity Percent</label>
          <input
            type="number"
            class="form-control"
            name="purityPercent"
            id="field_purityPercent"
            data-cy="purityPercent"
            formControlName="purityPercent"
          />
          <div
            *ngIf="
              editForm.get('purityPercent')!.invalid && (editForm.get('purityPercent')!.dirty || editForm.get('purityPercent')!.touched)
            "
          >
            <small class="form-text text-danger" *ngIf="editForm.get('purityPercent')?.errors?.min">
              This field should be at least 0.
            </small>
            <small class="form-text text-danger" [hidden]="!editForm.get('purityPercent')?.errors?.number">
              This field should be a number.
            </small>
          </div>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span>Cancel</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span>Save</span>
        </button>
      </div>
    </form>
  </div>
</div>
