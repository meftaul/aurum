<div class="row justify-content-center">
    <div class="col-8">
        <div *ngIf="transactionHistory">
            <h2><span>Transaction History</span> {{transactionHistory.id}}</h2>
            <hr>
            <jhi-alert-error></jhi-alert-error>
            <dl class="row-md jh-entity-details">
                <dt><span>Voucher No</span></dt>
                <dd>
                    <span>{{transactionHistory.voucherNo}}</span>
                </dd>
                <dt><span>Amount</span></dt>
                <dd>
                    <span>{{transactionHistory.amount}}</span>
                </dd>
                <dt><span>Date Created</span></dt>
                <dd>
                    <span>{{transactionHistory.dateCreated}}</span>
                </dd>
                <dt><span>Tag</span></dt>
                <dd>
                    <span>{{transactionHistory.tag}}</span>
                </dd>
                <dt><span>Customer Id</span></dt>
                <dd>
                    <span>{{transactionHistory.customerId}}</span>
                </dd>
                <dt><span>Added By</span></dt>
                <dd>
                    <span>{{transactionHistory.addedBy}}</span>
                </dd>
            </dl>

            <button type="submit"
                    (click)="previousState()"
                    class="btn btn-info">
                <fa-icon [icon]="'arrow-left'"></fa-icon>&nbsp;<span> Back</span>
            </button>

            <button type="button"
                    [routerLink]="['/transaction-history', transactionHistory.id, 'edit']"
                    class="btn btn-primary">
                <fa-icon [icon]="'pencil-alt'"></fa-icon>&nbsp;<span> Edit</span>
            </button>
        </div>
    </div>
</div>
