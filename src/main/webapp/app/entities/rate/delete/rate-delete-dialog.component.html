@if (rate) {
  <form name="deleteForm" class="seal-break" (ngSubmit)="confirmDelete(rate.id!)">
    <div class="modal-header seal-break__header">
      <h4 class="modal-title" data-cy="rateDeleteDialogHeading">Confirm delete operation</h4>
    </div>

    <div class="modal-body seal-break__body">
      <jhi-alert-error />

      <div class="seal-break__subject">
        <div class="seal seal--lg seal-break__seal" aria-hidden="true">{{ (rate.rateType || '?').charAt(0) | uppercase }}</div>
        <div>
          <p class="seal-break__name" id="jhi-delete-rate-heading">{{ rate.rateType || 'Rate ' + rate.id }}</p>
          <p class="seal-break__id">Rate No. {{ rate.id }}</p>
        </div>
      </div>

      <p class="seal-break__warning">This rate will be permanently removed. This action cannot be undone.</p>
    </div>

    <div class="modal-footer seal-break__footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban"></fa-icon>&nbsp;<span>Cancel</span>
      </button>

      <button id="jhi-confirm-delete-rate" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times"></fa-icon>&nbsp;<span>Delete</span>
      </button>
    </div>
  </form>
}
